<!DOCTYPE html>

<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

      color: #F5F5F5;

    .links a:hover {
      background: #2A2A3E;
      border-color: #FF6B6B;
    }
    .links a span {
      display: block;
      font-size: 13px;
      font-weight: 400;
